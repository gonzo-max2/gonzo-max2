name: Build Profile OS
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
    paths: ["content/**", "scripts/**", "docs/**", "README.md", "assets/**"]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: python3 scripts/build_profile.py
      - run: git diff --exit-code -- README.md assets/generated docs/data receipts/profile-build.json
      - run: python3 scripts/validate_profile.py && python3 scripts/verify_profile_os.py && node --check docs/app.js
      - name: Secret-pattern gate
        run: |
          if grep -RInE --exclude-dir=.git '(ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{20,})' .; then exit 1; fi
      - uses: actions/upload-artifact@v4
        with: { name: profile-os-receipts, path: receipts/ }
