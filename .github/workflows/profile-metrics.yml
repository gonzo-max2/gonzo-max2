name: Profile Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/generate_activity.py"
      - ".github/workflows/profile-metrics.yml"

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate verified activity assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_OWNER: gonzo-max2
          PROFILE_ASSET_DIR: assets
        run: python scripts/generate_activity.py

      - name: Validate profile
        run: python scripts/validate_profile.py

      - name: Commit refreshed assets
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- assets/activity-dark.svg assets/activity-light.svg; then
            echo "Activity assets are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity-dark.svg assets/activity-light.svg
          git commit -m "chore(profile): refresh verified activity"
          git push
